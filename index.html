<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris XVI • Lookbook Privé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-white text-gray-900">
    <div class="max-w-screen-md mx-auto px-6 py-20 text-center">
        <header class="mb-16">
            <h1 class="text-4xl tracking-widest uppercase mb-4 text-slate-800">Paris XVI</h1>
            <div class="h-px w-20 bg-black mx-auto mb-4"></div>
            <p class="text-xs tracking-[0.2em] text-gray-500 uppercase italic">Catalogue Privilège • Soldes 2026</p>
        </header>

        <main>
            <div class="aspect-[3/4] bg-slate-100 mb-8 flex items-center justify-center border border-slate-200 rounded-sm shadow-sm">
                <p class="text-slate-400 italic font-light">Photo de la collection à venir...</p>
            </div>
            <h2 class="text-2xl mb-2 uppercase tracking-tight text-slate-800">Veste Sportswear Luxe</h2>
            <p class="text-slate-500 mb-12 text-lg">Prix exclusif : 490€ </p>
            
            <a href="#" class="inline-block border border-slate-900 px-12 py-5 text-xs uppercase tracking-widest hover:bg-slate-900 hover:text-white transition-all duration-300">
                Réserver ma taille
            </a>
        </main>
    </div>
</body>
</html>
