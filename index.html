<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelly Passy 16 - Catalogue Luxe</title>
    <style>
        :root { --gold: #D4AF37; --black: #1a1a1a; --white: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: var(--white); color: var(--black); padding-bottom: 90px; }
        
        header { text-align: center; padding: 50px 20px; border-bottom: 1px solid #f2f2f2; }
        h1 { font-weight: 200; letter-spacing: 5px; text-transform: uppercase; margin: 0; font-size: 1.8em; }
        .location { color: var(--gold); font-size: 0.8em; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; }

        /* Grille des produits */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; padding: 10px; }
        .item { position: relative; aspect-ratio: 1 / 1; background: #fafafa; overflow: hidden; }
        .item img { width: 100%; height: 100%; object-fit: cover; }

        /* Barre de contact fixe */
        .nav-contact { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 1px solid #eee; padding: 15px; gap: 10px; z-index: 1000; }
        .btn { flex: 1; text-align: center; padding: 14px; text-decoration: none; border-radius: 2px; font-weight: 500; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; }
        .btn-black { background: var(--black); color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
    </style>
</head>
<body>

<header>
    <h1>Kelly Passy 16</h1>
    <div class="location">Paris XVI — Sélection Exclusive</div>
</header>

<div class="grid">
    <div class="item"><img src="https://via.placeholder.com/600/000/fff?text=Kelly+Item+1" alt="Luxe"></div>
    <div class="item"><img src="https://via.placeholder.com/600/000/fff?text=Kelly+Item+2" alt="Luxe"></div>
    <div class="item"><img src="https://via.placeholder.com/600/000/fff?text=Kelly+Item+3" alt="Luxe"></div>
</div>

<div class="nav-contact">
    <a href="tel:01XXXXXX" class="btn btn-black">Appeler</a>
    <a href="https://wa.me/336XXXXXXXX" class="btn btn-whatsapp">WhatsApp</a>
</div>

</body>
</html>
