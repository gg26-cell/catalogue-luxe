<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelly Passy 16</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1 { font-family: 'Playfair Display', serif; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 15px; } }
    </style>
</head>
<body class="bg-white">

    <header class="py-12 px-6 text-center border-b border-gray-50">
        <h1 class="text-3xl tracking-[0.2em] uppercase mb-2">Kelly Passy 16</h1>
        <p class="text-[10px] tracking-[0.4em] text-gray-400 uppercase">Dépôt-Vente de Luxe • Paris XVI</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="product-grid">
            
            <div class="aspect-square bg-gray-100 overflow-hidden">
                <img src="images/photo1.jpg" alt="Article Luxe" class="w-full h-full object-cover">
            </div>

            <div class="aspect-square bg-gray-100 overflow-hidden">
                <img src="images/photo2.jpg" alt="Article Luxe" class="w-full h-full object-cover">
            </div>

            <div class="aspect-square bg-gray-100 overflow-hidden">
                <img src="images/photo3.jpg" alt="Article Luxe" class="w-full h-full object-cover">
            </div>
            <div class="aspect-square bg-gray-100 overflow-hidden">
                <img src="images/photo4.jpg" alt="Article Luxe" class="w-full h-full object-cover">
            </div>
            <div class="aspect-square bg-gray-100 overflow-hidden">
                <img src="images/photo5.jpg" alt="Article Luxe" class="w-full h-full object-cover">
            </div>
            <div class="aspect-square bg-gray-100 overflow-hidden">
                <img src="images/photo6.jpg" alt="Article Luxe" class="w-full h-full object-cover">
            </div>

        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 flex gap-3 z-50">
        <a href="tel:+33627633337" class="flex-1 bg-black text-white text-center py-4 rounded-sm text-[10px] tracking-widest uppercase font-bold shadow-2xl">Appeler la boutique</a>
        <a href="https://wa.me/33627633337" class="flex-1 bg-[#25D366] text-white text-center py-4 rounded-sm text-[10px] tracking-widest uppercase font-bold shadow-2xl">WhatsApp</a>
    </nav>

</body>
</html>
